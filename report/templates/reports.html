{% extends 'layout.html' %}
{% block body %}

<style>
    .accordion-button::after {
    display: none !important;
}
</style>


<!-- Sidebar -->
<div id="sidebar" class="sidebar position-fixed d-flex flex-column bg-dark text-white vh-100 "
    style="overflow-y: auto;">
    <div class="d-flex m-3">
        <h3 class="h6 text-info fw-bold mx-2">MARKS</h3>
        <h3 class="h6">Vision Center</h3>
    </div>

    <form class="form m-3">
        <div class="form-group">
            <input type="text" class="form-control" placeholder="Search...">
        </div>
    </form>

    <div class="accordion accordion-flush" id="sidebarAccordion">
        {% for report in reports %}
        <!-- Industry Accordion -->
        <div class="accordion-item bg-dark border-0 mt-2">
            <h2 class="accordion-header">
                <a class="accordion-button collapsed bg-dark text-white generate-report-btn" href="/reports/viewReport/{{report.id}}">
                    <i class="fa-solid fa-file"></i>
                    <span class="mx-2">{{ report.title }}</span>
                </a>
            </h2>
        </div>
        {% endfor %}
    </div>
</div>


<!-- Overlay -->
<div id="overlay" class="overlay"></div>
<div class="container mt-5 d-flex justify-content-center align-items-center">
    <form method="POST" action="/reports/createReportFormat" class="bg-dark text-light shadow p-4 rounded" style="width: 100%; max-width: 700px;">
      {% csrf_token %}
      <div class="mb-3">
        <label for="reportTitle" class="form-label fw-bold">Report Title</label>
        <input type="text" class="form-control" id="reportTitle" name="title" required>
      </div>
  
      <!-- Diagrams List -->
      <div class="mb-3">
        <label class="form-label fw-bold">Diagrams</label>
        <div id="diagramsList"></div>
        <button type="button" class="btn btn-sm btn-info mt-2" data-bs-toggle="modal" data-bs-target="#addDiagramModal">
          <i class="fa-solid fa-plus me-1"></i> Add Diagram
        </button>
      </div>
  
      <!-- Description -->
      <div class="mb-3">
        <label for="reportDescription" class="form-label fw-bold">Description</label>
        <textarea class="form-control" id="reportDescription" name="description" rows="4"></textarea>
      </div>
  
      <button type="submit" class="btn btn-success">
        <i class="fa-solid fa-save me-1"></i> Save Format
      </button>
    </form>
  
    <!-- Modal for adding a diagram -->
    <div class="modal fade" id="addDiagramModal" tabindex="-1" aria-labelledby="addDiagramModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header">
            <h5 class="modal-title" id="addDiagramModalLabel">
              <i class="fa-solid fa-chart-simple me-1"></i> Add Diagram
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
  
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label">Diagram Type</label>
              <select class="form-select" id="diagramType">
                <option value="heatmap">Heatmap</option>
                <option value="bar">Bar Chart</option>
                <option value="sankey">Sankey</option>
                <option value="line">Line Graph</option>
                <option value="pie">Pie Chart</option>
                <option value="table">Table</option>
              </select>
            </div>
  
            <div class="mb-2">
              <label class="form-label">Meters</label>
              <select class="form-select" id="diagramMeters" multiple>
                {% for meter in meters %}
                  <option value="{{ meter.id }}">{{ meter.name }}</option>
                {% endfor %}
              </select>
            </div>
  
            <div class="mb-2">
              <label class="form-label">Measurement</label>
              <select class="form-select" id="diagramMeasurement">
                {% for measurement in measurements %}
                  <option value="{{ measurement.id }}">{{ measurement.name }}</option>
                {% endfor %}
              </select>
            </div>
  
            <div class="mb-2">
              <label class="form-label">Date Range</label>
              <div class="d-flex gap-2">
                <input type="date" class="form-control" id="diagramStartDate">
                <input type="date" class="form-control" id="diagramEndDate">
              </div>
            </div>
  
            <div class="mb-2">
              <label class="form-label">Period Type</label>
              <select class="form-select" id="diagramPeriodType">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>

            <div class="mb-2">
                <label class="form-label">Description</label>
                <textarea name="description" id="description" cols="30" rows="10" class="form-control"></textarea>
            </div>
  
          </div>
  
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="addDiagramBtn">
              <i class="fa-solid fa-plus me-1"></i> Add Diagram
            </button>
          </div>
        </div>
      </div>
    </div>

  
    <script>
        document.addEventListener('DOMContentLoaded', () => {
          const diagramType = document.getElementById('diagramType');
          const metersSelect = document.getElementById('diagramMeters');
          const measurementSelect = document.getElementById('diagramMeasurement');
          const periodType = document.getElementById('diagramPeriodType');
          const dateRangeContainer = document.querySelector('#diagramPeriodType').parentElement.previousElementSibling; // The div containing Date Range
          const startDateInput = document.getElementById('diagramStartDate');
          const endDateInput = document.getElementById('diagramEndDate');
        
          function updateForm() {
            const selected = diagramType.value;
        
            // Reset to default for all options
            metersSelect.multiple = true;
            metersSelect.parentElement.style.display = 'block';
            measurementSelect.multiple = false;
            periodType.parentElement.style.display = 'block';
        
            dateRangeContainer.style.display = 'block';
            startDateInput.type = 'date';
            endDateInput.type = 'date';
            endDateInput.style.display = 'inline-block';
        
            if (selected === 'heatmap') {
              // Heatmap: single meter, no period type
              metersSelect.multiple = false;
              periodType.parentElement.style.display = 'none';
        
            } else if (selected === 'sankey') {
              // Sankey: no meters, single date input, keep period type
              metersSelect.parentElement.style.display = 'none';
              endDateInput.style.display = 'none';
        
            } else if (selected === 'line') {
              // Trend: keep meters, remove period type, change date to datetime
              periodType.parentElement.style.display = 'none';
              startDateInput.type = 'datetime-local';
              endDateInput.type = 'datetime-local';
        
            } else if (selected === 'table') {
              // Table: single meter, multiple measurement
              metersSelect.multiple = false;
              measurementSelect.multiple = true;
        
            }
          }
        
          // Initial state on page load
          updateForm();
        
          // Listen for changes
          diagramType.addEventListener('change', updateForm);
        });
        </script>
        




  </div>
  
      <script>
        const diagramsList = document.getElementById('diagramsList');
        const addDiagramBtn = document.getElementById('addDiagramBtn');
      
        addDiagramBtn.addEventListener('click', function() {
            const type = document.getElementById('diagramType').value;
            const meters = Array.from(document.getElementById('diagramMeters').selectedOptions).map(opt => opt.value);
            const measurementSelect = document.getElementById('diagramMeasurement');
            const measurements = Array.from(measurementSelect.selectedOptions).map(opt => opt.value);
            const startDate = document.getElementById('diagramStartDate').value;
            const endDate = document.getElementById('diagramEndDate').value;
            const periodType = document.getElementById('diagramPeriodType').value;
            const description = document.getElementById('description').value;


            if (!type || !startDate) {
                alert('Please fill in all required fields!');
                return;
            }

            // Validate meters
            if (type !== 'sankey' && meters.length === 0) {
                alert('Please select meters!');
                return;
            }

            let payload = { type, meters, startDate, endDate, periodType, description };

            if (type === 'table') {
                if (measurements.length === 0) {
                alert('Please select at least one measurement for Table!');
                return;
                }
                payload.measurements = measurements;
            } else {
                if (!measurements[0]) {
                alert('Please select a measurement!');
                return;
                }
                payload.measurement = measurements[0];
            }

            const div = document.createElement('div');
            div.classList.add('p-2', 'mb-2', 'bg-info', 'rounded');
            div.innerHTML = `
                <strong>${type}</strong> | Meters: ${meters.join(', ')} | Measurements: ${type === 'table' ? measurements.join(', ') : payload.measurement} | ${startDate} to ${endDate} | ${periodType}
                <input type="hidden" name="diagrams[]" value='${JSON.stringify(payload)}'>
            `;
            diagramsList.appendChild(div);

            const modal = bootstrap.Modal.getInstance(document.getElementById('addDiagramModal'));
            modal.hide();
            });

      </script>

  



{% endblock %}
