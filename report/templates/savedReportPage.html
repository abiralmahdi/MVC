{% extends 'layout.html' %}
{% block body %}


<!-- Sidebar -->
<div id="sidebar" class="sidebar position-fixed d-flex flex-column bg-dark text-white vh-100 "
  style="overflow-y: auto;">
  <div class="d-flex m-3">
    <h3 class="h6 text-info fw-bold mx-2">MARKS</h3>
    <h3 class="h6">Vision Center</h3>
  </div>

  <form class="form m-3">
    <div class="form-group">
      <input type="text" class="form-control" placeholder="Search...">
    </div>
  </form>

  <div class="accordion accordion-flush" id="sidebarAccordion">
    {% for report in reports %}
    <!-- Industry Accordion -->
    <div class="accordion-item bg-dark border-0 mt-2">
      <h2 class="accordion-header">
        <a class="accordion-button collapsed bg-dark text-white generate-report-btn"
          href="/reports/viewSavedReports/{{report.id}}">
          <i class="fa-solid fa-file"></i>
          <span class="mx-2">{{ report.title }}</span>
        </a>
      </h2>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Overlay -->
<div id="overlay" class="overlay"></div>

<div class="container">
  <div id="noDocument">
    <h1 class="h1 text-center mt-5 pt-5 text-secondary"><i class="fa-solid fa-file fa-2x"></i></h1>
    <h3 class="text-center mt-5 text-secondary">Select a report to view details</h3>
    <p class="text-center text-secondary">Click on any report link from the sidebar to see its content here.</p>
  </div>
</div>



{% endblock %}
