{% extends 'layout.html' %}

{% block body %}

<style>
    /* graph */
    .graph-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
        }

        .graph-card {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 1rem;
            flex: 1 1 calc(50% - 1rem);
            /* Two per row */
            min-width: 300px;
            max-width: 48%;
        }

        .graph-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .graph-header h5 {
            margin: 0;
        }
</style>

<!-- Sidebar -->
<div id="sidebar" class="sidebar position-fixed d-flex flex-column">
    <div class="d-flex mt-5">
        <h3 class="h5 text-info fw-bold mx-2">MARKS</h3><h3 class="h5"> Vision Center</h3>
      </div>
    <form action="" class="form p-3">
        <div class="form-group mb-1">
            <input type="text" class="form-control" placeholder="Search..." >
        </div>
    </form>
    <a href="/dashboard/plantSummary" class="text-white">Plant Summary</a>
    <a href="/dashboard/allUtilities" class="text-white">Energy - All Utilities</a>
    <a href="/dashboard/energyCostComparison" class="text-white">Energy - Cost Comparison</a>
    <a href="/dashboard/plantHeatMaps" class="text-white">Plant - Heat Maps</a>
    <a href="/dashboard/sankeyDiagram" class="text-white">Plant - Sankey Diagram</a>
    <a href="/dashboard/statusTable" class="text-white">Plant - Status Table</a>

  </div>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

    <div class="container-fluid" id="main-content">
        
        <div class="row">
            <main class="mt-3">
                <div class="graph-container">
                    <div class="d-flex flex-wrap justify-content-center gap-3">
                        <div class="graph-card bg-dark border-dark rounded p-3 text-white shadow"
                            style="height: 300px;">
                            <div class="d-flex">
                                <h6 class="mb-2 mx-2">Histogram</h6>
                                <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                    <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                                </select>
                                
                                <i class="fa-solid m-2 fa-window-maximize"></i>
                            </div>

                            <canvas id="histogramChart" style="max-height: 200px;"></canvas>
                        </div>

                        
                        <div class="graph-card bg-dark border-dark rounded p-3 text-white shadow" style="height: 300px;">
                            <div class="d-flex flex-wrap align-items-center">
                              <h6 class="mb-2">Pie Chart</h6>
                              <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                              </select>
                              
                              <i class="fa-solid m-2 fa-window-maximize"></i>
                            </div>
                            <canvas id="pieChart" style="max-height: 200px;"></canvas>
                          </div>
                          

                        <div class="graph-card bg-dark border-dark rounded p-3 text-white shadow"
                            style="height: 300px;">
                            <div class="d-flex">
                                <h6 class="mb-2 mx-2">Histogram</h6>
                                <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                    <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                                </select>
                                
                                <i class="fa-solid m-2 fa-window-maximize"></i>
                            </div>
                            <canvas id="hist2VarChart" style="max-height: 200px;"></canvas>
                        </div>

                        <div class="graph-card bg-dark border-dark rounded p-3 text-white shadow"
                            style="height: 300px;">
                            <div class="d-flex">
                                <h6 class="mb-2 mx-2">Histogram</h6>
                                <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                    <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                                </select>
                                
                                <i class="fa-solid m-2 fa-window-maximize"></i>
                            </div>
                            <canvas id="barChart" style="max-height: 200px;"></canvas>
                        </div>
                    </div>



                </div>



            </main>
        </div>
    </div>


    <script>
        // Histogram
        new Chart(document.getElementById('histogramChart'), {
            type: 'bar',
            data: {
                labels: ['0-10', '10-20', '20-30', '30-40'],
                datasets: [{
                    label: 'Frequency',
                    data: [5, 10, 8, 4],
                    backgroundColor: '#0dcaf0'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: {}, y: { beginAtZero: true } }
            }
        });

        // Histogram of 2 Variables
        new Chart(document.getElementById('hist2VarChart'), {
            type: 'bar',
            data: {
                labels: ['A', 'B', 'C', 'D'],
                datasets: [
                    { label: 'Var 1', data: [4, 6, 5, 3], backgroundColor: '#6610f2' },
                    { label: 'Var 2', data: [3, 7, 2, 6], backgroundColor: '#d63384' }
                ]
            },
            options: {
                responsive: true,
                scales: { x: {}, y: { beginAtZero: true } }
            }
        });

        // Pie Chart
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: ['Red', 'Blue', 'Yellow'],
                datasets: [{
                    data: [10, 20, 30],
                    backgroundColor: ['#dc3545', '#0d6efd', '#ffc107']
                }]
            },
            options: {
                responsive: true
            }
        });

        // Horizontal Bar Chart
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['Item A', 'Item B', 'Item C', 'Item D'],
                datasets: [{
                    label: 'Scores',
                    data: [8, 5, 9, 3],
                    backgroundColor: '#198754'
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true } }
            }
        });
    </script>
{% endblock %}
