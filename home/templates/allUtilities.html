{% extends 'layout.html' %}

{% block body %}

<!-- Sidebar -->
<div id="sidebar" class="sidebar position-fixed d-flex flex-column">
    <div class="d-flex mt-5">
        <h3 class="h5 text-info fw-bold mx-2">MARKS</h3><h3 class="h5"> Vision Center</h3>
      </div>
    <form action="" class="form p-3">
        <div class="form-group mb-1">
            <input type="text" class="form-control" placeholder="Search..." >
        </div>
    </form>
    <a href="/dashboard/plantSummary" class="text-white">Plant Summary</a>
    <a href="/dashboard/allUtilities" class="text-white">Energy - All Utilities</a>
    <a href="/dashboard/energyCostComparison" class="text-white">Energy - Cost Comparison</a>
    <a href="/dashboard/plantHeatMaps" class="text-white">Plant - Heat Maps</a>
    <a href="/dashboard/sankeyDiagram" class="text-white">Plant - Sankey Diagram</a>
    <a href="/dashboard/statusTable" class="text-white">Plant - Status Table</a>

  </div>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <div class="container-fluid" id="main-content" style="overflow-x: hidden;">
    <div class="row">
        <main class="w-100">
            <div class="graph-container">

                <div class="mb-4">
                    <div class="graph-card bg-dark border-dark rounded text-white shadow w-100" style="height: 280px;">
                        <div class="d-flex">
                            <h6 class="mx-2 mt-2">Total Electricity Usage</h6>
                            <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                            </select>
                            <i class="fa-solid m-2 fa-window-maximize"></i>
                        </div>
                        <canvas id="totalElectricity" style="max-height: 200px;"></canvas>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="graph-card bg-dark border-dark rounded text-white shadow w-100" style="height: 280px;">
                        <div class="d-flex">
                            <h6 class="mx-2 mt-2">Total Gas Usage</h6>
                            <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                            </select>
                            <i class="fa-solid m-2 fa-window-maximize"></i>
                        </div>
                        <canvas id="totalGas" style="max-height: 200px;"></canvas>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="graph-card bg-dark border-dark rounded text-white shadow w-100" style="height: 280px;">
                        <div class="d-flex">
                            <h6 class="mx-2 mt-2">Total Water Usage</h6>
                            <select class="form-select form-select-sm mb-2 ms-auto" style="width: 100px;">
                                <option>Last 7 days</option>
                                <option>Last 14 days</option>
                                <option>Last 28 days</option>
                            </select>
                            <i class="fa-solid m-2 fa-window-maximize"></i>
                        </div>
                        <canvas id="totalWater" style="max-height: 200px;"></canvas>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>



    <script>
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    
        const options = {
            responsive: true,
            scales: {
                x: {},
                y: {
                    beginAtZero: true,
                    max: 1000000,
                    ticks: {
                        stepSize: 500000,
                        callback: function(value) {
                            return value.toLocaleString() + ' kWh';
                        },
                        color: '#fff'
                    },
                    grid: { color: '#444' }
                }
            },
            plugins: {
                legend: {
                    labels: { color: '#fff' }
                }
            }
        };
    
        // Total Electricity
        new Chart(document.getElementById('totalElectricity'), {
            type: 'bar',
            data: {
                labels: months,
                datasets: [
                    { label: 'Last year', data: [400000, 550000, 620000, 480000, 510000, 530000, 580000, 600000, 620000, 590000, 610000, 630000], backgroundColor: '#826061' },
                    { label: 'This year', data: [300000, 470000, 510000, 420000, 460000, 500000, 520000, 540000, 560000, 550000, 570000, 590000], backgroundColor: '#ff5c5c' }
                ]
            },
            options: options
        });
    
        // Total Water
        new Chart(document.getElementById('totalWater'), {
            type: 'bar',
            data: {
                labels: months,
                datasets: [
                    { label: 'Last year', data: [380000, 490000, 580000, 460000, 490000, 510000, 560000, 570000, 600000, 580000, 600000, 620000], backgroundColor: '#607991' },
                    { label: 'This year', data: [290000, 450000, 500000, 400000, 450000, 470000, 510000, 520000, 540000, 530000, 550000, 570000], backgroundColor: '#0398fc' }
                ]
            },
            options: options
        });
    
        // Total Gas
        new Chart(document.getElementById('totalGas'), {
            type: 'bar',
            data: {
                labels: months,
                datasets: [
                    { label: 'Last year', data: [410000, 520000, 600000, 470000, 500000, 520000, 550000, 570000, 590000, 580000, 600000, 620000], backgroundColor: '#5d8c66' },
                    { label: 'This year', data: [320000, 460000, 530000, 410000, 470000, 490000, 530000, 550000, 570000, 560000, 580000, 600000], backgroundColor: '#099124' }
                ]
            },
            options: options
        });
    </script>
    
{% endblock %}
